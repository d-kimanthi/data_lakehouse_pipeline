name: retail_orders
config_version: 1.0
class_name: Datasource
execution_engine:
  class_name: SparkDFExecutionEngine
data_connectors:
  default_runtime_data_connector_name:
    class_name: RuntimeDataConnector
    batch_identifiers:
      - default_identifier_name
  default_inferred_data_connector_name:
    class_name: InferredAssetIcebergDataConnector
    base_directory: s3a://dk-retail-analytics-lake/warehouse/retail/orders
    default_regex:
      pattern: (.*)
      group_names:
        - table_name
